<!DOCTYPE html>
<html>
<head>
  <title>ID VERIFICATION</title>
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: url('background.jpg') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      position: relative;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .overlay::before {
      content: "";
      position: absolute;
      width: 350px;
      height: 350px;
      background: url('logo.png') no-repeat center/contain;
      opacity: 0.07;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .card {
      background: rgba(0,0,0,0.75);
      padding: 25px;
      border-radius: 15px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      text-align: center;
    }

    .status-active { color: #00ff88; font-weight: bold; }
    .status-inactive { color: red; font-weight: bold; }

    .spinner {
      border: 5px solid #ccc;
      border-top: 5px solid #00ff88;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .id-card {
      margin-top: 20px;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
      text-align: left;
    }

    .id-header {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .id-body {
      display: flex;
      align-items: center;
      gap: 12px;
    }

     .id-photo {
    width: 90px;
    height: 90px;
    border-radius: 8px;
    object-fit: cover;
    object-position: center top;
    background: #222;
      }

    .id-info {
      font-size: 13px;
    }

    .id-footer {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
    }

    .verified-text {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="overlay">
  <div class="card">
    <h2>ID VERIFICATION</h2>

    <div id="result">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>
</div>

<script>
const sheetURL = "https://opensheet.elk.sh/1kgBqO6ebkaTlyXj0yUbYJTXEoFYIsyiV1b42khFAYYU/Sheet1";

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");


function fixImageURL(url){
  if(!url) return "";

  url = url.trim();

  let match = url.match(/[-\w]{25,}/);
  if(match){
    return "https://drive.google.com/uc?export=view&id=" + match[0];
  }

  return url;
}

function getField(row, key){
  let keys = Object.keys(row);
  let found = keys.find(k => k.trim().toLowerCase() === key.toLowerCase());
  return found ? row[found] : "";
}

function getPhoto(row){
  return row["Picture"];
}

function buildFullName(person){
  let first = getField(person, "First Name");
  let middle = getField(person, "Middle Name");
  let last = getField(person, "Last Name");
  return `${last}, ${first} ${middle}`.trim();
}

fetch(sheetURL)
.then(res => res.json())
.then(data => {

  if(!id){
    document.getElementById("result").innerHTML = "No ID provided";
    return;
  }

const person = data.find(row => 
  getField(row,"ID Number").trim() === id.trim()
);

  if(person){

    let fullName = buildFullName(person);
    let photo = fixImageURL(person["Picture"]);
    let position = getField(person,"Position");

    let officerPosition = getField(person,"Officer Position");

    let status = getField(person,"Status");
    let statusClass = status === "ACTIVE" ? "status-active" : "status-inactive";
    
    console.log("RAW PHOTO:", getPhoto(person));
    console.log("FINAL PHOTO:", photo);
    console.log("ALL DATA:", person);

    
    document.getElementById("result").innerHTML = 
      `<p><strong>${fullName}</strong></p>
       <p>ID: ${getField(person,"ID Number")}</p>
       <p>Officer Position: ${officerPosition}</p>
       <p>Status: <span class="${statusClass}">${status}</span></p>
       <p>Verification: ${getField(person,"Verification")}</p>

       <div class="id-card">
         <div class="id-header">OFFICIAL ID CARD</div>
       
      <div class="id-body">
          <img class="id-photo" src="${photo || 'https://via.placeholder.com/90'}"
       onerror="this.src='https://via.placeholder.com/90'">


           <div class="id-info">
             <strong>${fullName}</strong><br>
             ID: ${getField(person,"ID Number")}<br>
             Position: ${position}
           </div>
         </div>

         <div class="id-footer">
           Verified • ${status}
         </div>
       </div>

       <div class="verified-text">
         This information is verified by the organization.
       </div>
      `;

  } else {
    document.getElementById("result").innerHTML = "Invalid ID";
  }

})
.catch(() => {
  document.getElementById("result").innerHTML = "Error loading data";
});
</script>

</body>
</html>
